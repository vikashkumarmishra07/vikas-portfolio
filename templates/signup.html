<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #0b1120);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .login-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 18px;
            width: 350px;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.35);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
            margin: 20px 0;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            background: linear-gradient(to right, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #8b5cf6, #ec4899);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .error {
            margin-top: 5px;
            color: #ff6b6b;
            font-size: 12px;
            text-align: left;
        }

        .non-field-error {
            margin-top: 15px;
            color: #ff6b6b;
            font-size: 14px;
        }

        .back-home {
            margin-top: 18px;
            display: block;
            color: #8b5cf6;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Sign Up</h2>

    <form method="POST">
        {% csrf_token %}

        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="error">{{ field.errors|striptags }}</div>
            {% endif %}
        {% endfor %}

        {% if form.non_field_errors %}
            <div class="non-field-error">
                {{ form.non_field_errors|striptags }}
            </div>
        {% endif %}

        <button type="submit">Sign Up</button>
    </form>

    <a href="{% url 'login' %}" class="back-home">Already have an account? Login</a>
    <a href="/" class="back-home">← Back to Portfolio</a>
</div>

</body>
</html>
